<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Small promo tile — 440×280</title>
<link rel="stylesheet" href="_frame.css">
<style>
  html, body, .stage { width: 440px; height: 280px; }
  .stage {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 24px;
  }
  .logo {
    width: 64px; height: 64px;
    filter: drop-shadow(0 8px 16px rgba(0, 108, 73, 0.28));
  }
  h1 {
    font-size: 38px; font-weight: 800; letter-spacing: -0.03em;
    color: var(--on-surface); line-height: 1;
  }
  .tagline {
    font-size: 14px; color: var(--on-surface-variant); font-weight: 500;
    text-align: center; max-width: 360px; line-height: 1.35;
  }
  .tagline em {
    font-style: normal; font-weight: 700;
    background: linear-gradient(120deg, var(--primary) 0%, var(--primary-2) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
</style>
</head>
<body>
  <div class="stage">
    <img class="logo" src="../../icons/brand.svg" alt="JustFYI">
    <h1>JustFYI</h1>
    <div class="tagline">Know if that "free" tool is <em>actually free</em> — before you upload.</div>
  </div>
</body>
</html>
